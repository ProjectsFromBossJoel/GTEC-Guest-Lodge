<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed – GTEC Guest Lodge</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #faf8f3; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'DM Sans', sans-serif; }
        .card { background: white; border-radius: 24px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 32px 80px rgba(0,0,0,0.1); }
        .check { font-size: 60px; color: #16a34a; margin-bottom: 20px; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin: 0 0 12px; }
        p { color: #64748b; font-size: 14px; line-height: 1.7; margin: 0 0 8px; }
        .id-badge { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 20px; display: inline-block; margin: 12px 0 20px; }
        .home-btn { display: inline-block; padding: 12px 32px; background: #0d1117; color: white; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .home-btn:hover { background: #c9a84c; color: #0d1117; }
    </style>
</head>
<body>
<div class="card">
    <div class="check"><i class="fas fa-check-circle"></i></div>
    <h2>Payment Being Processed</h2>
    <p>We're verifying your payment now. You will receive a final confirmation via <strong>email</strong> and <strong>SMS</strong> once it's confirmed.</p>
    <div class="id-badge" id="bookingIdDisplay">Loading…</div>
    <p style="font-size:12px; color:#94a3b8;">Questions? Call us at +233 24 466 0848</p>
    <a href="/" class="home-btn">← Back to Home</a>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('bookingId');
    if (id) document.getElementById('bookingIdDisplay').textContent = 'Booking ID: ' + id;
</script>
</body>
</html>
